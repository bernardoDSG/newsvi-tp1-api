<!doctype html>
<html lang="pt-BR">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f8fa;
      color: #20242a;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    h1 {
      margin: 0 0 12px;

      line-height: 1.5;
    }

    .actions {
